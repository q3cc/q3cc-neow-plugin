<!DOCTYPE html>
  <html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 30px 24px 38px;
        font-family: Inter, "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        background: #ffffff;
        color: #1a1a1b;
      }
      .canvas {
        width: 720px;
        margin: 0 auto;
        padding: 8px 0 30px;
      }
      .header {
        margin-bottom: 26px;
        text-align: center;
      }
      .title {
        margin: 0;
        font-size: 38px;
        line-height: 1.15;
        font-weight: 800;
        letter-spacing: 0.02em;
      }
      .subtitle {
        margin-top: 10px;
        font-size: 18px;
        line-height: 1.6;
        color: #787c7e;
        font-weight: 600;
      }
      .board {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .rank-row {
        min-height: 72px;
        border: 2px solid #d3d6da;
        border-radius: 14px;
        background: #ffffff;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 16px;
      }
      .rank-badge {
        width: 64px;
        height: 64px;
        flex: 0 0 64px;
        border: 2px solid #d3d6da;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        color: #1a1a1b;
      }
      .rank-badge span {
        display: block;
        font-size: 28px;
        line-height: 1;
        font-weight: 800;
      }
      .rank-content {
        flex: 1;
        min-width: 0;
      }
      .rank-label,
      .self-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .rank-label {
        font-size: 26px;
        line-height: 1.3;
        font-weight: 700;
        letter-spacing: 0.01em;
      }
      .coin-pill {
        min-width: 190px;
        padding: 0 16px;
        height: 50px;
        border-radius: 999px;
        background: #f3f4f6;
        color: #1a1a1b;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        line-height: 1;
        font-weight: 700;
        white-space: nowrap;
      }
      .rank-row.champion {
        border-color: #6aaa64;
      }
      .rank-row.champion .rank-badge {
        background: #6aaa64;
        border-color: #6aaa64;
        color: #ffffff;
      }
      .rank-row.champion .coin-pill {
        background: #6aaa64;
        color: #ffffff;
      }
      .rank-row.runner-up {
        border-color: #c9b458;
      }
      .rank-row.runner-up .rank-badge {
        background: #c9b458;
        border-color: #c9b458;
        color: #ffffff;
      }
      .rank-row.runner-up .coin-pill {
        background: #c9b458;
        color: #ffffff;
      }
      .rank-row.third {
        border-color: #787c7e;
      }
      .rank-row.third .rank-badge {
        background: #787c7e;
        border-color: #787c7e;
        color: #ffffff;
      }
      .rank-row.third .coin-pill {
        background: #787c7e;
        color: #ffffff;
      }
      .rank-row.placeholder {
        border-style: dashed;
        background: #ffffff;
      }
      .rank-row.placeholder .rank-badge,
      .rank-row.placeholder .coin-pill {
        background: #ffffff;
        color: #d3d6da;
      }
      .rank-row.placeholder .rank-label {
        color: #d3d6da;
      }
      .self-card {
        margin-top: 18px;
        padding: 18px 20px;
        border: 2px solid #d3d6da;
        border-radius: 14px;
        background: #ffffff;
      }
      .self-title {
        font-size: 20px;
        line-height: 1.4;
        font-weight: 800;
        margin-bottom: 12px;
      }
      .self-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .self-name {
        flex: 1;
        min-width: 0;
        font-size: 22px;
        line-height: 1.4;
        font-weight: 700;
      }
      .self-coins {
        font-size: 22px;
        line-height: 1.4;
        font-weight: 700;
        white-space: nowrap;
      }
      .footer {
        margin-top: 28px;
        font-size: 13px;
        line-height: 1.6;
        color: #7f858c;
        text-align: center;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <div class="header">
        <h1 class="title">Star 币排行榜</h1>
        <div class="subtitle">看看谁是大富翁</div>
      </div>
      <div class="board">
        <div class="rank-row champion">
          <div class="rank-badge" aria-label="第 1 名">
            <span>1</span>
          </div>
          <div class="rank-content">
            <div class="rank-label">大喵喵</div>
          </div>
          <div class="coin-pill">9999 枚 Star 币</div>
        </div>
      
        <div class="rank-row runner-up">
          <div class="rank-badge" aria-label="第 2 名">
            <span>2</span>
          </div>
          <div class="rank-content">
            <div class="rank-label">小星星</div>
          </div>
          <div class="coin-pill">8848 枚 Star 币</div>
        </div>
      
        <div class="rank-row third">
          <div class="rank-badge" aria-label="第 3 名">
            <span>3</span>
          </div>
          <div class="rank-content">
            <div class="rank-label">团子</div>
          </div>
          <div class="coin-pill">6666 枚 Star 币</div>
        </div>
      
        <div class="rank-row standard">
          <div class="rank-badge" aria-label="第 4 名">
            <span>4</span>
          </div>
          <div class="rank-content">
            <div class="rank-label">阿月</div>
          </div>
          <div class="coin-pill">5200 枚 Star 币</div>
        </div>
      
        <div class="rank-row standard">
          <div class="rank-badge" aria-label="第 5 名">
            <span>5</span>
          </div>
          <div class="rank-content">
            <div class="rank-label">云朵</div>
          </div>
          <div class="coin-pill">4096 枚 Star 币</div>
        </div>
      
        <div class="rank-row standard">
          <div class="rank-badge" aria-label="第 6 名">
            <span>6</span>
          </div>
          <div class="rank-content">
            <div class="rank-label">糖糖</div>
          </div>
          <div class="coin-pill">3666 枚 Star 币</div>
        </div>
      
        <div class="rank-row standard">
          <div class="rank-badge" aria-label="第 7 名">
            <span>7</span>
          </div>
          <div class="rank-content">
            <div class="rank-label">夏夜</div>
          </div>
          <div class="coin-pill">2999 枚 Star 币</div>
        </div>
      
        <div class="rank-row standard">
          <div class="rank-badge" aria-label="第 8 名">
            <span>8</span>
          </div>
          <div class="rank-content">
            <div class="rank-label">铃兰</div>
          </div>
          <div class="coin-pill">2400 枚 Star 币</div>
        </div>
      
        <div class="rank-row standard">
          <div class="rank-badge" aria-label="第 9 名">
            <span>9</span>
          </div>
          <div class="rank-content">
            <div class="rank-label">白雪</div>
          </div>
          <div class="coin-pill">1888 枚 Star 币</div>
        </div>
      
        <div class="rank-row standard">
          <div class="rank-badge" aria-label="第 10 名">
            <span>10</span>
          </div>
          <div class="rank-content">
            <div class="rank-label">花火</div>
          </div>
          <div class="coin-pill">1666 枚 Star 币</div>
        </div>
      </div>
      
    <div class="self-card">
      <div class="self-title">你当前第 18 名</div>
      <div class="self-row">
        <div class="self-name">主人</div>
        <div class="self-coins">777 枚 Star 币</div>
      </div>
    </div>
  
      <div class="footer"><strong>q3cc-neow-plugin</strong></div>
    </div>
  </body>
  </html>
